<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Google Analytics loads lazily via src/lib/analytics.ts (gated on
         VITE_GA_ID) with manual SPA page_view events. Do not re-add a
         hardcoded gtag snippet here — it double-counts the first pageview. -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts are self-hosted and bundled via @fontsource (see src/index.css).
         No external Google Fonts request, so the real font is ready on first
         paint with no swap flash. The display font (Newsreader, used by every
         heading) is preloaded so it's in hand before the first paint. -->
    <link rel="preload" href="/fonts/newsreader-standard-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
    <link rel="shortcut icon" href="/favicon.ico">

    <meta name="theme-color" content="#0F2A44" />
    <meta name="color-scheme" content="light" />

    <meta property="og:site_name" content="LocalFix" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LocalFix — Better websites. Less busywork." />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:image:alt" content="LocalFix — Better websites. Less busywork." />
    <meta name="author" content="LocalFix" />

    <!-- Per-route title, description, canonical, og:*, twitter:*, robots, and
         geo.* tags are injected per route by the build-time prerender
         (scripts/prerender.mjs + src/entry-server.tsx), and kept in sync
         during client-side navigation by src/pages/RouteSeo.tsx. -->

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "@id": "https://localfix.now/#business",
      "name": "LocalFix.now",
      "alternateName": ["LocalFix", "LocalFix Web Design & Automation"],
      "description": "Fresno web designer offering websites, workflow automation, and AI for small businesses across California.",
      "url": "https://localfix.now",
      "email": "help@localfix.now",
      "telephone": "+1-559-389-8850",
      "priceRange": "$",
      "image": "https://localfix.now/og-image.png",
      "logo": "https://localfix.now/assets/logo-icon.png",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Fresno",
        "addressRegion": "CA",
        "addressCountry": "US"
      },
      "areaServed": [
        { "@type": "City", "name": "Fresno" },
        { "@type": "City", "name": "Clovis" },
        { "@type": "City", "name": "Madera" },
        { "@type": "City", "name": "Sanger" },
        { "@type": "City", "name": "Selma" },
        { "@type": "City", "name": "Visalia" },
        { "@type": "City", "name": "Kerman" },
        { "@type": "City", "name": "Hanford" },
        { "@type": "AdministrativeArea", "name": "Central Valley, California" },
        { "@type": "AdministrativeArea", "name": "California" }
      ],
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 36.7378,
        "longitude": -119.7871
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
        "opens": "09:00",
        "closes": "18:00"
      },
      "founder": {
        "@type": "Person",
        "@id": "https://localfix.now/#founder",
        "name": "Eslam Shousha"
      },
      "sameAs": [
        "https://maps.google.com/?cid=17860024772841425269",
        "https://www.yelp.com/biz/localfix-now-fresno"
      ]
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "@id": "https://localfix.now/#services",
      "name": "Web Design and Workflow Automation",
      "serviceType": "Web Design and Workflow Automation",
      "url": "https://localfix.now",
      "provider": { "@id": "https://localfix.now/#business" },
      "areaServed": [
        { "@type": "City", "name": "Fresno" },
        { "@type": "City", "name": "Clovis" },
        { "@type": "City", "name": "Madera" },
        { "@type": "City", "name": "Sanger" },
        { "@type": "City", "name": "Selma" },
        { "@type": "City", "name": "Visalia" },
        { "@type": "City", "name": "Kerman" },
        { "@type": "City", "name": "Hanford" },
        { "@type": "AdministrativeArea", "name": "Central Valley, California" },
        { "@type": "AdministrativeArea", "name": "California" }
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "LocalFix Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Custom Website Design",
              "description": "Custom websites for Fresno-based and California small businesses, mobile-friendly, built in 1-2 weeks."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Workflow Automation",
              "description": "Custom booking systems, inquiry automation, and internal dashboards for local businesses."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Chatbot Development",
              "description": "Custom AI chatbots and FAQ assistants trained on your business."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Website Fixes and Refresh",
              "description": "Fast fixes for broken or outdated business websites."
            }
          }
        ]
      }
    }
    </script>

    <!-- FAQPage structured data lives in src/components/Faq.tsx so the markup is
         emitted only on pages that render the visible FAQ (keeping schema and
         on-page content in sync). -->

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://localfix.now/#website",
      "url": "https://localfix.now",
      "name": "LocalFix",
      "description": "Fresno web designer offering websites, workflow automation, and AI for small businesses across California.",
      "publisher": { "@id": "https://localfix.now/#business" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
