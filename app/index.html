    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Web Design and Workflow Automation",
      "provider": { "@id": "https://localfix.now/#business" },
      "areaServed": [
        { "@type": "City", "name": "Fresno" },
        { "@type": "AdministrativeArea", "name": "Central Valley, California" },
        { "@type": "AdministrativeArea", "name": "California" }
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "LocalFix Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Custom Website Design",
              "description": "Custom websites for Fresno-based and California small businesses, mobile-friendly, built in 1-2 weeks."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Workflow Automation",
              "description": "Custom booking systems, inquiry automation, and internal dashboards for local businesses."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Chatbot Development",
              "description": "Custom AI chatbots and FAQ assistants trained on your business."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Website Fixes and Refresh",
              "description": "Fast fixes for broken or outdated business websites."
            }
          }
        ]
      }
    }

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How much does a custom website cost in Fresno?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LocalFix offers flat-price websites starting at $499 for a refresh of an existing site and $1,499 for a new custom website. Final price depends on the number of pages and features."
          }
        },
        {
          "@type": "Question",
          "name": "How fast can you build a new website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most new websites launch in 10-14 days from the kickoff call. Refresh projects ship in 7-10 days. Same-week turnaround on small fixes."
          }
        },
        {
          "@type": "Question",
          "name": "Do you serve businesses outside Fresno?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. LocalFix serves businesses across the entire Central Valley including Clovis, Madera, Visalia, Hanford, Selma, and Reedley. We also work with clients anywhere in California."
          }
        },
        {
          "@type": "Question",
          "name": "What is workflow automation and do I need it?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Workflow automation replaces manual tasks like answering common questions, booking appointments, routing customer inquiries, and tracking orders. If your team spends multiple hours each week on repetitive tasks, automation can save 5-15 hours a week."
          }
        },
        {
          "@type": "Question",
          "name": "Can you build an AI chatbot for my business?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. We build custom AI chatbots trained on your specific business — not generic ChatGPT wrappers. They handle FAQs, capture leads, and route customers to the right place 24/7."
          }
        }
      ]
    }
    </script>
